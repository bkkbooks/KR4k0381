body:
  text: 段龜龍涼記呂光字世明連結豪賢施待士身長八尺四寸目重瞳子左肘生寅印性沈重質略寬大有度量時人莫之識惟王猛布衣時異之曰此非凡人太平御覽呂光左肘生肉印及征南城印內隱起文字曰巨霸太平御覽呂光太安二年龜茲國使至貢寶貨奇珍汗血馬光臨正殿設會文武博戲太平御覽呂光時敦煌太守宋歆獻同心之梨初學記呂光太安三年白雀巢於陽川令蓋敏室太平御覽呂光時張掖金澤有麟見群獸皆從改元麟嘉太平御覽呂光太安三年白燕遊酒泉郡黑燕列從藝文類聚呂光稱王遣使市六璽於于闐太平御覽涼王呂光麟嘉二年以沮渠羅仇為西寧太守往年蝗蟲所到之處産子地中是月盡生或一頃二頃覆地跳躍宿昔變異王乃躬臨撲蟲幸揚川潒水北大駕所到蟲尋殮盡是以麥苗損耗無幾藝文類聚呂光麟嘉五年疏勒王獻火浣布善舞馬太平御覽呂光龍飛二年太常郭黁反叛黁以箋書招誘楊軌推為盟主軌性直不慮黁之傾危西河太守程肇諫軌曰將軍之於呂主可謂臭味是同今欲釋同心託異類背龍頭尋蛇尾非將軍之高算也太平御覽郭黁略地之際王孫八人年幼悉隨乳母先在東苑黁遂盡投王孫於鋒刃之上或枝分節解飲血盟衆覩者無不掩目寒心而黁意氣然太平御覽呂光時州人陳沖得玉璽博三寸長四寸光澤無文向日視之字在腹中有三十四字言光當王北堂書鈔太平御覽呂光時有任射者得罪自匿為王欣家奴發覺應死射有奇巧王爾魯般之儔也故赦之及大殿歲久傾敗任射運巧致思土木俱正太平御覽呂光破龜茲始獲鳩摩羅什光死子纘立戲弄羅什或共棊博及殺子云斫胡奴頭什曰不斫胡奴頭胡奴斫人頭後纘弟字曰胡奴果斬纘頭太平御覽呂纂咸寧二年夜見龍出東廂井中行大殿歬蟠臥旦見其鱗甲足迹尚有溼處太平御覽呂纂咸寧二年胡安璩等發張駿墓得真珠簾箔雲母屏風琉璃榼白玉樽受三升赤玉簫紫玉笛珊瑚鞭瑪瑙鍾黃金勒太平御覽太常卿楊穎上疏諫呂纂飲酒過度出入無恤纂曰不有直亮誰匡邪僻之君也纂雖有此諫終不能改太平御覽呂纂常與左右因醉騁馳遊獵或馬奔於坑塹之間侍御史王回中書侍郎王儒控馬諫曰千金之子坐不垂堂萬乘之主清道而行奈何去輿輦之安冒奔馳之危銜橛之變動有不測之禍愚臣竊所未安敢以死爭願陛下宜憶袁盎攬轡之言不令臣等受譏干載纂不納隱王張美人生色壯豔出家為道呂隆逼之乃自投張掖門樓雙股頓折口誦經顏色自若俄而死太平御覽呂纂明光宮在漸臺西以金玉珠璣為䈴箔北堂書鈔太平御覽永嘉五年枹罕令嚴羌妾産一龍一鷲鷲尋飛去龍十五日風雨迎之大風吹拔張掖郡大樹經宿還立北堂書鈔李皓三日宴于曲水命群寮賦詩皓為之序太平御覽先酒泉南有銅駝山大雨雪沮渠蒙遜遣工取之得銅數萬斤太平御覽焉支山在郡西界東西百餘里南北二十里有松柏五木其水草茂美宜蓄牧與祁連山同一名刪丹山太平御覽有青鹽池出鹽正方半寸其形似石甚甜美太平御覽祁連山張掖酒泉二界之上東西二百里南北百餘里山中冬溫夏涼宜牧牛乳酪濃好夏寫酪不用器物刈草著其上不散酪特好酪一斛得升餘酥又有仙人樹行人山中飢渴者輒食之飽不得持去平居不可見太平御覽昌松縣有鸞鳥城魏改為神烏縣張軌時有五色鳥集於其處築城藝文類聚張天錫字公純嘏安定烏氏人張耳後也曾祖軌永嘉中為涼州刺史值京師大亂遂據涼土天錫纂位自立為涼州牧苻堅使將姚萇攻沒涼州天錫歸長安堅以為侍中比部尚書歸義侯從堅至壽陽堅軍敗遂南歸拜散騎常侍西平公天錫明鑒穎發英聲少著契吳山在縣北七十里赫連勃勃北遊契吳而嘆曰美哉斯阜臨廣澤而帶清海吾行地多矣自馬嶺以北大河以南未有若斯之壯麗者也太平御覽可藍山一名都盧山皆涇水源與笄頭山連亙赫連定勝光二年畋於涼州登可藍山望統萬城泣曰先帝若以朕承大業豈有今日乎太平御覽赫連定據平涼登此山有群狐繞之而鳴射之竟不得一定乃嘆曰咄咄此亦怪事也太平御覽
